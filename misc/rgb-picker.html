<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB Color Picker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#f5f5f3;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:2rem}
.wrap{display:flex;gap:28px;flex-wrap:wrap;background:#fff;padding:1.5rem;border-radius:12px;border:1px solid #e0e0d8;max-width:900px;width:100%}
.left{display:flex;flex-direction:column;gap:12px}
#sq{width:420px;height:420px;border-radius:8px;cursor:crosshair;position:relative;border:1px solid #ccc;flex-shrink:0}
#sq canvas{border-radius:8px;display:block}
#cursor{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #000;pointer-events:none;transform:translate(-50%,-50%);top:50%;left:50%;z-index:2}
.hue-wrap{width:420px;height:18px}
#hue{width:100%;height:18px;border-radius:9px;cursor:pointer;border:1px solid #ccc;appearance:none;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
#hue::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #999;cursor:pointer;margin-top:-1px}
#hue::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #999;cursor:pointer}
.right{display:flex;flex-direction:column;gap:16px;min-width:200px;flex:1}
.preview{width:100%;height:70px;border-radius:8px;border:1px solid #ccc}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;color:#888;letter-spacing:.05em}
input[type=text]{font-family:monospace;font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111;width:100%}
input[type=text]:focus{outline:none;border-color:#888}
.row3{display:flex;gap:8px}
.ch{display:flex;flex-direction:column;gap:4px;flex:1}
.ch input{text-align:center}
.err{font-size:11px;color:#c0392b;min-height:14px}
.dot{position:absolute;width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.9);box-shadow:0 0 0 1px rgba(0,0,0,0.5);transform:translate(-50%,-50%);cursor:pointer;z-index:3;transition:transform .1s}
.dot:hover{transform:translate(-50%,-50%) scale(1.6);z-index:10}
.tooltip{position:absolute;background:rgba(20,20,20,0.92);color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;pointer-events:none;white-space:nowrap;z-index:20;transform:translate(-50%,-110%);line-height:1.5;display:none}
.tooltip.show{display:block}
.legend{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;padding-right:4px}
.legend::-webkit-scrollbar{width:4px}
.legend::-webkit-scrollbar-track{background:#f0f0ec}
.legend::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.legend-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:background .1s}
.legend-item:hover{background:#f5f5f0}
.legend-item.active{border-color:#aaa;background:#f0f0ec}
.swatch{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,0.15);flex-shrink:0}
.lname{font-size:12px;color:#222;flex:1}
.lprice{font-size:11px;color:#888}
.section-title{font-size:11px;color:#888;letter-spacing:.06em;margin-bottom:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div id="sq">
      <canvas id="cv" width="420" height="420"></canvas>
      <div id="cursor"></div>
      <div id="tooltip" class="tooltip"></div>
    </div>
    <div class="hue-wrap"><input type="range" id="hue" min="0" max="360" value="0"></div>
  </div>
  <div class="right">
    <div class="preview" id="preview"></div>
    <div class="field">
      <label>HEX</label>
      <input type="text" id="hex" placeholder="#ff0000">
    </div>
    <div class="field">
      <label>RGB (r, g, b)</label>
      <input type="text" id="rgb" placeholder="255, 0, 0">
      <div class="err" id="err"></div>
    </div>
    <div class="row3">
      <div class="ch"><label>R</label><input type="text" id="cr"></div>
      <div class="ch"><label>G</label><input type="text" id="cg"></div>
      <div class="ch"><label>B</label><input type="text" id="cb"></div>
    </div>
    <div class="section-title">KOLORY</div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<script>
const colors=[{name:"Brak podświetlenia",rgb:"255, 255, 255",price:"5,000$"},{name:"Biały",rgb:"255, 255, 255",price:"15,000$"},{name:"Marchwiowy",rgb:"255, 165, 0",price:"25,000$"},{name:"Pomarańczowy",rgb:"255, 69, 0",price:"25,000$"},{name:"Żółty",rgb:"255, 255, 0",price:"25,000$"},{name:"Czerwony",rgb:"255, 0, 0",price:"35,000$"},{name:"Niebieski",rgb:"0, 0, 255",price:"35,000$"},{name:"Czekoladowe",rgb:"102, 51, 0",price:"35,000$"},{name:"Lazurowy",rgb:"0, 127, 255",price:"35,000$"},{name:"Czarny",rgb:"0, 0, 0",price:"35,000$"},{name:"Fioletowy",rgb:"128, 0, 128",price:"35,000$"},{name:"Aqua",rgb:"30, 200, 255",price:"35,000$"},{name:"Miętowy",rgb:"0, 102, 51",price:"35,000$"},{name:"Zielony",rgb:"20, 140, 0",price:"35,000$"},{name:"Limonkowy",rgb:"147, 246, 0",price:"35,000$"},{name:"Różowy",rgb:"255, 140, 240",price:"35,000$"},{name:"Złoty",rgb:"226, 200, 105",price:"35,000$"},{name:"Kiwi",rgb:"66, 245, 182",price:"35,000$"},{name:"Pistacja",rgb:"0, 255, 148",price:"35,000$"},{name:"Jadeitowy",rgb:"0, 128, 128",price:"40,000$"},{name:"Purpurowy",rgb:"102, 0, 51",price:"40,000$"},{name:"Malinowy",rgb:"235, 1, 101",price:"40,000$"},{name:"Magenta",rgb:"255, 0, 255",price:"40,000$"},{name:"Herbaciany",rgb:"204, 93, 43",price:"40,000$"},{name:"Cynamonowy",rgb:"157, 91, 3",price:"40,000$"},{name:"Ocean",rgb:"51, 102, 204",price:"45,000$"},{name:"Lodowy",rgb:"0, 255, 251",price:"45,000$"},{name:"Butelkowa Zieleń",rgb:"50, 102, 71",price:"45,000$"},{name:"Ametystowy",rgb:"153, 102, 204",price:"45,000$"},{name:"Wiśniowy",rgb:"220, 20, 60",price:"45,000$"},{name:"Eozyna",rgb:"195, 92, 111",price:"45,000$"},{name:"Gruszkowy",rgb:"188, 226, 113",price:"45,000$"},{name:"Luka",rgb:"12, 60, 99",price:"45,000$"},{name:"Różowy",rgb:"188, 143, 143",price:"50,000$"},{name:"Very Peri",rgb:"104, 104, 172",price:"50,000$"},{name:"Rubinowy",rgb:"120, 18, 11",price:"55,000$"},{name:"Winogronowy",rgb:"102, 5, 181",price:"55,000$"},{name:"Oliwkowy",rgb:"121, 128, 0",price:"55,000$"}];

const SIZE=420;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const sq=document.getElementById('sq'),cur=document.getElementById('cursor');
const hueSlider=document.getElementById('hue');
const preview=document.getElementById('preview');
const hexIn=document.getElementById('hex'),rgbIn=document.getElementById('rgb');
const crIn=document.getElementById('cr'),cgIn=document.getElementById('cg'),cbIn=document.getElementById('cb');
const err=document.getElementById('err');
const tooltip=document.getElementById('tooltip');
const legend=document.getElementById('legend');
let hue=0,sx=SIZE,sy=0;

function drawSquare(h){
  const g1=ctx.createLinearGradient(0,0,SIZE,0);
  g1.addColorStop(0,'#fff');
  g1.addColorStop(1,`hsl(${h},100%,50%)`);
  ctx.fillStyle=g1;ctx.fillRect(0,0,SIZE,SIZE);
  const g2=ctx.createLinearGradient(0,0,0,SIZE);
  g2.addColorStop(0,'rgba(0,0,0,0)');
  g2.addColorStop(1,'#000');
  ctx.fillStyle=g2;ctx.fillRect(0,0,SIZE,SIZE);
}

function hsl2rgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}

function squareToRgb(x,y,h){
  const s=(x/SIZE)*100,l=100-(y/SIZE)*100;
  const ll=l*(1-s/200);
  const ss=ll===0||ll===100?0:(l-ll)/Math.min(ll,100-ll)*100;
  return hsl2rgb(h,ss,ll);
}

function toHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}

function updateUI(r,g,b){
  preview.style.background=`rgb(${r},${g},${b})`;
  hexIn.value=toHex(r,g,b);
  rgbIn.value=`${r}, ${g}, ${b}`;
  crIn.value=r;cgIn.value=g;cbIn.value=b;
  err.textContent='';
}

function moveCursor(x,y){
  sx=Math.max(0,Math.min(SIZE,x));
  sy=Math.max(0,Math.min(SIZE,y));
  cur.style.left=sx+'px';cur.style.top=sy+'px';
}

function pick(x,y){
  moveCursor(x,y);
  const[r,g,b]=squareToRgb(sx,sy,hue);
  updateUI(r,g,b);
}

function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0;
  if(d){
    if(max===r)h=((g-b)/d)%6;
    else if(max===g)h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h=((h*60)+360)%360;
  }
  return[h,max?d/max:0,max];
}

function applyRgb(r,g,b,skipCursor){
  const[h,s,v]=rgb2hsv(r,g,b);
  hue=h;hueSlider.value=Math.round(h);
  drawSquare(hue);
  if(!skipCursor){sx=s*SIZE;sy=(1-v)*SIZE;moveCursor(sx,sy);}
  updateUI(r,g,b);
  placeDots();
}

drawSquare(hue);pick(sx,sy);

let drag=false;
sq.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('dot'))return;
  drag=true;const r=sq.getBoundingClientRect();pick(e.clientX-r.left,e.clientY-r.top);
});
document.addEventListener('mousemove',e=>{if(!drag)return;const r=sq.getBoundingClientRect();pick(e.clientX-r.left,e.clientY-r.top)});
document.addEventListener('mouseup',()=>drag=false);
sq.addEventListener('touchstart',e=>{if(e.target.classList.contains('dot'))return;e.preventDefault();const t=e.touches[0],r=sq.getBoundingClientRect();pick(t.clientX-r.left,t.clientY-r.top)},{passive:false});
sq.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=sq.getBoundingClientRect();pick(t.clientX-r.left,t.clientY-r.top)},{passive:false});

hueSlider.addEventListener('input',()=>{
  hue=+hueSlider.value;drawSquare(hue);
  const[r,g,b]=squareToRgb(sx,sy,hue);
  updateUI(r,g,b);placeDots();
});

rgbIn.addEventListener('keydown',e=>{if(e.key==='Enter')parseRgb()});
rgbIn.addEventListener('blur',parseRgb);
function parseRgb(){
  const v=rgbIn.value.trim(),m=v.match(/^(\d+)[,\s]+(\d+)[,\s]+(\d+)$/);
  if(!m){err.textContent='Format: r, g, b (np. 120, 45, 200)';return;}
  const[r,g,b]=[+m[1],+m[2],+m[3]];
  if([r,g,b].some(x=>x<0||x>255)){err.textContent='Wartości muszą być 0–255';return;}
  applyRgb(r,g,b);
}

hexIn.addEventListener('keydown',e=>{if(e.key==='Enter')parseHex()});
hexIn.addEventListener('blur',parseHex);
function parseHex(){
  const v=hexIn.value.trim().replace(/^#/,'');
  if(!/^[0-9a-fA-F]{6}$/.test(v)){err.textContent='Nieprawidłowy hex';return;}
  applyRgb(parseInt(v.slice(0,2),16),parseInt(v.slice(2,4),16),parseInt(v.slice(4,6),16));
}

function parseChannel(){
  const r=Math.max(0,Math.min(255,+crIn.value||0));
  const g=Math.max(0,Math.min(255,+cgIn.value||0));
  const b=Math.max(0,Math.min(255,+cbIn.value||0));
  applyRgb(r,g,b);
}
[crIn,cgIn,cbIn].forEach(i=>{i.addEventListener('keydown',e=>{if(e.key==='Enter')parseChannel()});i.addEventListener('blur',parseChannel)});

function parseRgbStr(s){const m=s.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);return m?[+m[1],+m[2],+m[3]]:null;}

function rgbToPos(r,g,b){
  const[h,s,v]=rgb2hsv(r,g,b);
  return{x:s*SIZE,y:(1-v)*SIZE,h};
}

let activeDot=null;

function placeDots(){
  document.querySelectorAll('.dot').forEach(d=>d.remove());
  colors.forEach((c,i)=>{
    const p=parseRgbStr(c.rgb);if(!p)return;
    const[r,g,b]=p;
    const pos=rgbToPos(r,g,b);
    const dot=document.createElement('div');
    dot.className='dot';
    dot.style.left=pos.x+'px';
    dot.style.top=pos.y+'px';
    dot.style.background=`rgb(${r},${g},${b})`;
    dot.dataset.idx=i;

    dot.addEventListener('mouseenter',()=>{
      tooltip.textContent=`${c.name} · ${c.price}`;
      tooltip.style.left=pos.x+'px';
      tooltip.style.top=pos.y+'px';
      tooltip.classList.add('show');
    });
    dot.addEventListener('mouseleave',()=>tooltip.classList.remove('show'));
    dot.addEventListener('click',()=>selectColor(i));
    sq.appendChild(dot);
  });
}

function selectColor(i){
  const c=colors[i];
  const p=parseRgbStr(c.rgb);if(!p)return;
  const[r,g,b]=p;
  applyRgb(r,g,b);
  document.querySelectorAll('.legend-item').forEach((el,j)=>{
    el.classList.toggle('active',j===i);
  });
  activeDot=i;
  const item=document.querySelectorAll('.legend-item')[i];
  if(item)item.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function buildLegend(){
  legend.innerHTML='';
  colors.forEach((c,i)=>{
    const p=parseRgbStr(c.rgb)||[200,200,200];
    const div=document.createElement('div');
    div.className='legend-item';
    div.innerHTML=`<div class="swatch" style="background:rgb(${p[0]},${p[1]},${p[2]})"></div><span class="lname">${c.name}</span><span class="lprice">${c.price}</span>`;
    div.addEventListener('click',()=>selectColor(i));
    legend.appendChild(div);
  });
}

buildLegend();
placeDots();
</script>
</body>
</html>
